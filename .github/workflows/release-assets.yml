name: Release assets

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v1.2.18.4"
        required: true
        default: "v1.2.18.4"

permissions:
  contents: write

concurrency:
  group: release-assets-${{ github.event.release.tag_name || inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Resolve tag and version
        id: meta
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG:-${INPUT_TAG:-$REF_NAME}}"
          if [ -z "$tag" ]; then
            echo "Unable to resolve release tag" >&2
            exit 1
          fi
          version="${tag#v}"
          version="${version#V}"
          if [ -z "$version" ] || [ "$version" = "$tag" ] || ! [[ "$tag" =~ ^[vV][0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must look like v1.2.18.4; got: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  ensure-release:
    name: Ensure GitHub release exists
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Create release when missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists"
          else
            gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TAG" \
              --notes "Automated build for $TAG"
          fi

  windows-installer:
    name: Windows x64 installer
    runs-on: windows-latest
    needs:
      - prepare
      - ensure-release
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/codex-plus-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          target: desktop
          arch: win64_msvc2022_64
          cache: true

      - name: Configure Qt environment
        shell: pwsh
        run: |
          if (-not (Test-Path "$env:QT_ROOT_DIR\bin\Qt6Svg.dll")) {
            throw "QtSvg runtime was not installed with Qt at $env:QT_ROOT_DIR"
          }
          if (-not (Test-Path "$env:QT_ROOT_DIR\lib\cmake\Qt6Svg\Qt6SvgConfig.cmake")) {
            throw "QtSvg CMake package was not installed with Qt at $env:QT_ROOT_DIR"
          }
          "CMAKE_PREFIX_PATH=$env:QT_ROOT_DIR" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "Qt6_DIR=$env:QT_ROOT_DIR\lib\cmake\Qt6" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "WINDEPLOYQT=$env:QT_ROOT_DIR\bin\windeployqt.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CMAKE_GENERATOR=NMake Makefiles" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm ci

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Prepare Flameshot source
        shell: bash
        run: bash scripts/vendor/prepare-flameshot-source.sh

      - name: Build release binaries
        env:
          CODEX_PLUS_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cargo build --release -p codex-plus-manager
          cargo build --release -p codex-plus-launcher --features embedded-flameshot

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-plus-plus.exe dist/windows/app/
          Copy-Item target/release/codex-plus-plus-manager.exe dist/windows/app/

      - name: Stage embedded Flameshot runtime
        shell: pwsh
        run: ./scripts/installer/windows/stage-embedded-flameshot.ps1 -AppDir dist/windows/app -BuildRoot target/release/build

      - name: Verify embedded Windows runtime
        shell: pwsh
        run: |
          $required = @(
            "dist/windows/app/codex_flameshot_embedded.dll",
            "dist/windows/app/Qt6Core.dll",
            "dist/windows/app/Qt6Gui.dll",
            "dist/windows/app/Qt6Widgets.dll",
            "dist/windows/app/Qt6Network.dll",
            "dist/windows/app/Qt6Svg.dll",
            "dist/windows/app/platforms/qwindows.dll"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "Missing required runtime file: $path"
            }
          }
          if (Test-Path "dist/windows/app/tools/flameshot") {
            throw "External Flameshot bundle should not be present in embedded mode"
          }

      - name: Build Windows installer
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$env:VERSION" CodexPlusPlus.nsi
          Pop-Location

      - name: Generate Windows checksum
        shell: pwsh
        run: |
          Get-ChildItem dist/windows/*.exe | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)" | Set-Content -Encoding ascii -NoNewline "$($_.FullName).sha256"
          }

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            dist/windows/*.exe
            dist/windows/*.exe.sha256

  macos-dmg:
    name: macOS ${{ matrix.arch }} DMG
    runs-on: ${{ matrix.runner }}
    needs:
      - prepare
      - ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/codex-plus-manager/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          target: desktop
          cache: true

      - name: Configure Qt environment
        run: |
          set -euo pipefail
          test -d "$QT_ROOT_DIR/lib/QtSvg.framework" || test -f "$QT_ROOT_DIR/lib/libQt6Svg.6.dylib"
          test -f "$QT_ROOT_DIR/lib/cmake/Qt6Svg/Qt6SvgConfig.cmake"
          echo "CMAKE_PREFIX_PATH=$QT_ROOT_DIR" >> "$GITHUB_ENV"
          echo "Qt6_DIR=$QT_ROOT_DIR/lib/cmake/Qt6" >> "$GITHUB_ENV"
          echo "MACDEPLOYQT=$QT_ROOT_DIR/bin/macdeployqt" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm ci

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Prepare Flameshot source
        run: bash scripts/vendor/prepare-flameshot-source.sh

      - name: Build release binaries
        env:
          CODEX_PLUS_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          cargo build --release --target ${{ matrix.target }} -p codex-plus-manager
          cargo build --release --target ${{ matrix.target }} -p codex-plus-launcher --features embedded-flameshot

      - name: Locate embedded Flameshot dylib
        run: |
          set -euo pipefail
          lib="$(find "$PWD/target/${{ matrix.target }}/release/build" \
            -path "*/out/flameshot-embedded-lib/libcodex_flameshot_embedded.dylib" \
            -type f \
            -print \
            -quit)"
          test -f "$lib"
          echo "EMBEDDED_FLAMESHOT_LIB=$lib" >> "$GITHUB_ENV"
          echo "CODEX_PLUS_EMBEDDED_FLAMESHOT=1" >> "$GITHUB_ENV"

      - name: Build macOS DMG
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" \
            bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          test -L "dist/macos/stage/Applications"
          test "$(readlink "dist/macos/stage/Applications")" = "/Applications"
          for app in "dist/macos/stage/Codex++.app" "dist/macos/stage/Codex++ 管理工具.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign --verify --deep --strict "$app" >/dev/null
            echo "verified: $app"
          done
          test -f "dist/macos/stage/Codex++.app/Contents/Frameworks/libcodex_flameshot_embedded.dylib"
          test ! -d "dist/macos/stage/Codex++.app/Contents/Helpers/Flameshot.app"
          otool -L "dist/macos/stage/Codex++.app/Contents/MacOS/CodexPlusPlus" | grep -F "@rpath/libcodex_flameshot_embedded.dylib"

      - name: Generate macOS checksum
        run: |
          set -euo pipefail
          for file in dist/macos/*.dmg; do
            shasum -a 256 "$file" | sed 's#  .*/#  #' > "$file.sha256"
          done

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            dist/macos/*.dmg
            dist/macos/*.dmg.sha256

  latest-json:
    name: Upload static latest.json
    runs-on: ubuntu-latest
    needs:
      - prepare
      - windows-installer
      - macos-dmg
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.prepare.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = release.tagName || process.env.TAG;
          const version = tag.replace(/^v/i, "");
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const assets = (release.assets || [])
            .map((asset) => asset.name)
            .filter((name) => name !== "latest.json")
            .filter((name) => !name.endsWith(".sha256"))
            .map((name) => ({ name, url: `${baseUrl}/${encodeURIComponent(name)}` }));
          const payload = {
            version: `v${version}`,
            url: release.url || `https://github.com/${repo}/releases/tag/${tag}`,
            body: release.body || "",
            assets
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
